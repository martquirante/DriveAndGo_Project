<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>DriveAndGo Fleet Map</title>
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background: #0a0a12;
            color: #e0e0f0;
            font-family: 'Segoe UI',sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOP BAR ── */
        #topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: #12121e;
            border-bottom: 1px solid #2a2a3e;
            flex-shrink: 0;
        }

            #topbar .title {
                font-size: 13px;
                font-weight: 700;
                color: #e6510d;
                letter-spacing: 1px;
            }

            #topbar .controls {
                display: flex;
                gap: 8px;
                align-items: center;
            }

        /* ── BUTTONS ── */
        .btn {
            padding: 5px 12px;
            border: 1px solid #3a3a55;
            background: #1a1a2e;
            color: #c0c0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Segoe UI',sans-serif;
            transition: all .2s;
        }

            .btn:hover {
                background: #252538;
                border-color: #e6510d;
                color: #e6510d;
            }

            .btn.active {
                background: #e6510d;
                color: #fff;
                border-color: #e6510d;
            }

        /* ── MAP ── */
        #map {
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        /* ── INFO BAR ── */
        #infobar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 16px;
            background: #10101c;
            border-top: 1px solid #2a2a3e;
            flex-shrink: 0;
            min-height: 44px;
        }

            #infobar .info-item {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 11px;
                color: #8080a0;
            }

                #infobar .info-item span {
                    color: #e0e0f0;
                    font-weight: 600;
                }

        .status-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .5px;
        }

        /* ── 3D VIEWER ── */
        #viewer3d {
            height: 220px;
            background: #080810;
            border-top: 1px solid #2a2a3e;
            position: relative;
            flex-shrink: 0;
        }

        #model-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        #placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: #3a3a5a;
            font-size: 13px;
            text-align: center;
            pointer-events: none;
        }

            #placeholder .icon {
                font-size: 28px;
                margin-bottom: 8px;
            }

        /* ── CUSTOM MARKERS ── */
        .vehicle-pin {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255,255,255,.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255,255,255,0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255,255,255,0);
            }
        }

        .vehicle-pin.lost {
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 0 0 rgba(239,68,68,.6);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(239,68,68,0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239,68,68,0);
            }
        }

        /* ── POPUP ── */
        .leaflet-popup-content-wrapper {
            background: #1a1a2e !important;
            color: #e0e0f0 !important;
            border: 1px solid #3a3a55 !important;
            border-radius: 10px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,.6) !important;
        }

        .leaflet-popup-tip {
            background: #1a1a2e !important;
        }

        .popup-name {
            font-size: 13px;
            font-weight: 700;
            color: #e6510d;
        }

        .popup-plate {
            font-size: 11px;
            color: #8080a0;
            margin-top: 2px;
        }

        .popup-status {
            font-size: 11px;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <!-- ── TOP BAR ── -->
    <div id="topbar">
        <div class="title">🗺 FLEET LIVE MAP</div>
        <div class="controls">
            <button class="btn active" id="btnStreet"
                    onclick="setLayer('street')">
                Street
            </button>
            <button class="btn" id="btnSat"
                    onclick="setLayer('satellite')">
                Satellite
            </button>
            <button class="btn" id="btnTraffic"
                    onclick="toggleTraffic()">
                Traffic
            </button>
            <button class="btn" onclick="fitAllMarkers()">Fit All</button>
        </div>
    </div>

    <!-- ── MAP ── -->
    <div id="map"></div>

    <!-- ── INFO BAR ── -->
    <div id="infobar">
        <div class="info-item">
            🚗 <span id="lblName">No vehicle selected</span>
        </div>
        <div class="info-item">
            🔖 <span id="lblPlate">—</span>
        </div>
        <div class="info-item">
            📍 <span id="lblStatus">—</span>
        </div>
        <div class="info-item">
            ⚡ <span id="lblSpeed">— km/h</span>
        </div>
        <div class="info-item">
            🕐 <span id="lblLastUpdate">—</span>
        </div>
    </div>

    <!-- ── 3D VIEWER ── -->
    <div id="viewer3d">
        <div id="placeholder">
            <div class="icon">🚗</div>
            Select a vehicle to view 3D model
        </div>
        <iframe id="model-iframe"
                allow="autoplay; fullscreen; xr-spatial-tracking"
                execution-while-out-of-viewport
                execution-while-not-rendered
                web-share></iframe>
    </div>

    <script>
        // ── Map init ──
        var map = L.map('map', { zoomControl: true })
            .setView([14.6760, 121.0437], 11);

        // ── Tile layers ──
        var streetLayer = L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
            { attribution: '© OpenStreetMap © CARTO', maxZoom: 19 });

        var satelliteLayer = L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/' +
            'World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { attribution: '© Esri', maxZoom: 19 });

        var trafficLayer = L.tileLayer(
            'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
            { attribution: '© OpenStreetMap', opacity: 0.3 });

        streetLayer.addTo(map);
        var currentBaseLayer = 'street';
        var trafficOn = false;

        function setLayer(type) {
            if (type === 'street') {
                map.removeLayer(satelliteLayer);
                streetLayer.addTo(map);
                document.getElementById('btnStreet').classList.add('active');
                document.getElementById('btnSat').classList.remove('active');
                currentBaseLayer = 'street';
            } else {
                map.removeLayer(streetLayer);
                satelliteLayer.addTo(map);
                document.getElementById('btnSat').classList.add('active');
                document.getElementById('btnStreet').classList.remove('active');
                currentBaseLayer = 'satellite';
            }
        }

        function toggleTraffic() {
            trafficOn = !trafficOn;
            var btn = document.getElementById('btnTraffic');
            if (trafficOn) {
                trafficLayer.addTo(map);
                btn.classList.add('active');
            } else {
                map.removeLayer(trafficLayer);
                btn.classList.remove('active');
            }
        }

        // ── Markers storage ──
        var markers = {};
        var polylines = {};

        // ── Called from C# to add/update a vehicle marker ──
        function updateVehicle(
            vehicleId, name, plate, status,
            lat, lng, speed, lastUpdate, modelUrl, isLost) {
            // Remove old marker
            if (markers[vehicleId]) {
                map.removeLayer(markers[vehicleId]);
            }

            // Pin color by status
            var color = '#3b82f6';
            var cssClass = 'vehicle-pin';
            if (isLost || status === 'Lost Signal') {
                color = '#ef4444'; cssClass = 'vehicle-pin lost';
            } else if (status === 'Available') {
                color = '#22c55e';
            } else if (status === 'Rented') {
                color = '#eab308';
            } else if (status === 'Maintenance') {
                color = '#a855f7';
            }

            var icon = L.divIcon({
                className: '',
                html: '<div class="' + cssClass + '" ' +
                    'style="background:' + color + ';"></div>',
                iconSize: [18, 18], iconAnchor: [9, 9]
            });

            var popupHtml =
                '<div class="popup-name">' + name + '</div>' +
                '<div class="popup-plate">' + plate + '</div>' +
                '<div class="popup-status">' +
                '<span style="color:' + color + ';">● </span>' +
                status + '</div>' +
                (speed > 0
                    ? '<div style="font-size:11px;margin-top:4px;color:#8080a0;">' +
                    '⚡ ' + speed + ' km/h</div>'
                    : '') +
                '<div style="font-size:10px;color:#5050708;margin-top:4px;">' +
                '🕐 ' + lastUpdate + '</div>';

            var marker = L.marker([lat, lng], { icon: icon });
            marker.bindPopup(popupHtml);
            marker.addTo(map);
            marker.on('click', function () {
                selectVehicle(
                    vehicleId, name, plate, status,
                    lat, lng, speed, lastUpdate, modelUrl);
            });

            markers[vehicleId] = marker;
        }

        // ── Select a vehicle (called from C# or marker click) ──
        function selectVehicle(
            vehicleId, name, plate, status,
            lat, lng, speed, lastUpdate, modelUrl) {
            // Update info bar
            document.getElementById('lblName').textContent = name;
            document.getElementById('lblPlate').textContent = plate;
            document.getElementById('lblStatus').textContent = status;
            document.getElementById('lblSpeed').textContent =
                speed > 0 ? speed + ' km/h' : 'Parked';
            document.getElementById('lblLastUpdate').textContent = lastUpdate;

            // Fly to marker
            map.flyTo([lat, lng], 16, { animate: true, duration: 1.2 });

            if (markers[vehicleId])
                markers[vehicleId].openPopup();

            // 3D model
            var iframe = document.getElementById('model-iframe');
            var placeholder = document.getElementById('placeholder');

            if (modelUrl && modelUrl.trim() !== '') {
                iframe.src = modelUrl;
                iframe.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                iframe.src = '';
                iframe.style.display = 'none';
                placeholder.innerHTML =
                    '<div class="icon">🔍</div>No 3D model for this vehicle';
                placeholder.style.display = 'block';
            }
        }

        // ── Fit map to show all markers ──
        function fitAllMarkers() {
            var bounds = [];
            for (var id in markers)
                bounds.push(markers[id].getLatLng());
            if (bounds.length > 0)
                map.fitBounds(bounds, { padding: [40, 40] });
        }

        // ── Clear all markers (called on refresh) ──
        function clearMarkers() {
            for (var id in markers)
                map.removeLayer(markers[id]);
            markers = {};
        }
    </script>
</body>
</html>
