<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <title>DriveAndGo Fleet</title>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css' />
    <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI',sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #030308;
            color: #c8d0f0;
        }

        /* ─── TOP BAR ─────────────────────────────────────────────── */
        #topbar {
            height: 48px;
            background: rgba(4,4,14,.98);
            border-bottom: 1px solid rgba(230,81,0,.3);
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 14px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

            #topbar::before {
                content: '';
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(230,81,0,.03) 80px,rgba(230,81,0,.03) 81px);
                pointer-events: none;
            }

            #topbar::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 1px;
                background: linear-gradient(90deg,transparent,rgba(230,81,0,.6),rgba(230,81,0,.6),transparent);
            }

        .t-logo {
            font-weight: 900;
            color: #e6510d;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-right: 6px;
            text-shadow: 0 0 12px rgba(230,81,0,.7);
        }

        .btn {
            padding: 5px 13px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 8.5px;
            font-weight: 700;
            letter-spacing: .5px;
            border: 1px solid rgba(255,255,255,.08);
            background: rgba(255,255,255,.03);
            color: #606090;
            transition: all .22s;
        }

            .btn.active, .btn:hover {
                background: rgba(230,81,0,.18);
                color: #e6510d;
                border-color: rgba(230,81,0,.55);
                box-shadow: 0 0 14px rgba(230,81,0,.25);
            }

        .spacer {
            flex: 1;
        }

        #liveCount {
            font-size: 9px;
            color: #303060;
            font-weight: 700;
            letter-spacing: .5px;
        }

        /* ─── MAP ─────────────────────────────────────────────────── */
        #map {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        /* ─── SPEED BADGE ──────────────────────────────────────────── */
        #spdbadge {
            position: absolute;
            bottom: 90px;
            right: 14px;
            width: 80px;
            height: 80px;
            background: rgba(3,3,10,.96);
            border: 2px solid #e6510d;
            border-radius: 50%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 900;
            box-shadow: 0 0 32px rgba(230,81,0,.55),inset 0 0 20px rgba(230,81,0,.08);
        }

        #spdval {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        #spdunit {
            font-size: 7px;
            color: #404080;
            letter-spacing: 2.5px;
            margin-top: 2px;
        }

        /* ─── INFO BAR ─────────────────────────────────────────────── */
        #infobar {
            height: 70px;
            background: rgba(3,3,10,.98);
            border-top: 1px solid rgba(230,81,0,.2);
            display: flex;
            align-items: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .ib-cell {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 16px;
            border-right: 1px solid rgba(255,255,255,.05);
            height: 100%;
        }

            .ib-cell:last-child {
                border-right: none;
                flex: 1;
            }

        .ib-lbl {
            font-size: 6.5px;
            color: #2a2a55;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 3px;
        }

        .ib-val {
            font-size: 12px;
            font-weight: 700;
            color: #c8d0f0;
        }

        .ib-desc {
            font-size: 9px;
            color: #505080;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* ─── VEHICLE MARKER ────────────────────────────────────────── */
        .v-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            filter: drop-shadow(0 6px 16px rgba(0,0,0,.8));
        }

        .v-shadow-ring {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 16px;
            background: radial-gradient(ellipse at 50% 70%,rgba(0,0,0,.6),transparent 70%);
            top: 4px;
            left: -5px;
            filter: blur(6px);
            pointer-events: none;
        }

        .v-ring {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            border: 2px solid var(--rc,#22c55e);
            background: linear-gradient(145deg,rgba(8,8,22,.98),rgba(4,4,14,.95));
            overflow: visible;
            box-shadow: 0 0 18px color-mix(in srgb,var(--rc) 45%,transparent),0 0 40px color-mix(in srgb,var(--rc) 18%,transparent),inset 0 1px 0 rgba(255,255,255,.06),inset 0 0 16px rgba(0,0,0,.6);
            transition: transform .6s cubic-bezier(.25,.8,.25,1);
            position: relative;
            z-index: 1;
        }

            .v-ring.selected {
                border-width: 3px;
                box-shadow: 0 0 28px var(--rc),0 0 60px color-mix(in srgb,var(--rc) 35%,transparent),0 0 90px color-mix(in srgb,var(--rc) 14%,transparent),inset 0 1px 0 rgba(255,255,255,.1);
            }

            .v-ring::before, .v-ring::after {
                content: '';
                position: absolute;
                width: 8px;
                height: 8px;
                border: 2px solid var(--rc,#22c55e);
                opacity: .6;
            }

            .v-ring::before {
                top: -3px;
                left: -3px;
                border-right: none;
                border-bottom: none;
                border-radius: 3px 0 0 0;
            }

            .v-ring::after {
                bottom: -3px;
                right: -3px;
                border-left: none;
                border-top: none;
                border-radius: 0 0 3px 0;
            }

        .v-inner {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .v-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .v-sym {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .v-pulse {
            position: absolute;
            inset: -10px;
            border-radius: 22px;
            border: 2px solid var(--rc,#22c55e);
            opacity: 0;
            pointer-events: none;
        }

            .v-pulse.moving {
                animation: pulse 1.6s cubic-bezier(.4,0,.6,1) infinite;
            }

        @keyframes pulse {
            0% {
                opacity: .8;
                transform: scale(.85)
            }

            100% {
                opacity: 0;
                transform: scale(1.5)
            }
        }

        .v-name {
            font-size: 8.5px;
            font-weight: 800;
            padding: 2px 9px;
            border-radius: 10px;
            background: rgba(3,3,10,.94);
            border: 1px solid rgba(255,255,255,.1);
            color: #c8d0f0;
            white-space: nowrap;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 10px rgba(0,0,0,.7);
        }

        .v-spd {
            font-size: 8px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(3,3,10,.9);
            border: 1px solid rgba(255,255,255,.08);
            color: #00ffc8;
            display: none;
            box-shadow: 0 0 8px rgba(0,255,200,.3);
        }

            .v-spd.on {
                display: block;
            }

        .v-lost {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ef4444;
            border: 3px solid rgba(255,255,255,.9);
            animation: blink 1.1s ease-in-out infinite;
            box-shadow: 0 0 14px rgba(239,68,68,.7);
        }

        @keyframes blink {
            0%,100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(239,68,68,.6)
            }

            50% {
                opacity: .7;
                box-shadow: 0 0 0 14px rgba(239,68,68,0)
            }
        }

        /* ─── HQ MARKER ─────────────────────────────────────────────── */
        .hq-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,.95));
        }

        .hq-img-ring {
            width: 96px;
            height: 96px;
            border-radius: 18px;
            border: 3px solid #e6510d;
            background: linear-gradient(145deg,rgba(8,6,16,.98),rgba(4,3,10,.96));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 32px rgba(230,81,13,.65),0 0 64px rgba(230,81,13,.25),inset 0 1px 0 rgba(255,255,255,.08);
            position: relative;
        }

            .hq-img-ring::before, .hq-img-ring::after {
                content: '';
                position: absolute;
                width: 12px;
                height: 12px;
                border: 2px solid #e6510d;
            }

            .hq-img-ring::before {
                top: -4px;
                left: -4px;
                border-right: none;
                border-bottom: none;
                border-radius: 4px 0 0 0;
            }

            .hq-img-ring::after {
                bottom: -4px;
                right: -4px;
                border-left: none;
                border-top: none;
                border-radius: 0 0 4px 0;
            }

        .hq-3d-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            border-radius: 16px;
        }

        .hq-fallback {
            font-size: 36px;
        }

        .hq-lbl {
            background: linear-gradient(135deg,#e6510d,#ff8c42);
            color: #fff;
            padding: 3px 11px;
            border-radius: 10px;
            font-size: 8.5px;
            font-weight: 800;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,.7);
            letter-spacing: .5px;
        }

        /* ─── POPUPS ─────────────────────────────────────────────────── */
        .leaflet-popup-content-wrapper {
            background: rgba(6,6,20,.97) !important;
            border: 1px solid rgba(230,81,0,.4) !important;
            border-radius: 14px !important;
            color: #c8d0f0 !important;
            box-shadow: 0 12px 40px rgba(0,0,0,.95),0 0 0 1px rgba(255,255,255,.04) !important;
            backdrop-filter: blur(10px) !important;
        }

        .leaflet-popup-tip {
            background: rgba(6,6,20,.97) !important;
        }

        .leaflet-popup-content {
            margin: 12px 16px !important;
        }

        .pp-name {
            font-size: 13px;
            font-weight: 800;
            color: #e6510d;
            margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(230,81,0,.4);
        }

        .pp-plate {
            display: inline-block;
            background: rgba(255,255,255,.05);
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,.1);
            color: #9090c0;
        }

        .pp-row {
            font-size: 10.5px;
            color: #6060a0;
            margin-top: 4px;
        }

        .pp-status {
            font-weight: 700;
        }

        /* ─── LIGHT THEME ──────────────────────────────────────────── */
        body.lt {
            background: #f0f0f8;
            color: #1a1a2e;
        }

            body.lt #topbar {
                background: rgba(255,255,255,.99);
                border-bottom-color: rgba(230,81,0,.25);
            }

            body.lt .btn {
                color: #505080;
            }

            body.lt #infobar {
                background: rgba(250,250,255,.99);
                border-top-color: #dcdcf0;
            }

            body.lt .ib-val {
                color: #1a1a2e;
            }

            body.lt .ib-desc {
                color: #606090;
            }

            body.lt .ib-cell {
                border-right-color: #e0e0f0;
            }

            body.lt .ib-lbl {
                color: #9090b0;
            }

            body.lt .v-ring {
                background: linear-gradient(145deg,rgba(248,248,255,.98),rgba(240,240,252,.95));
            }

            body.lt .leaflet-popup-content-wrapper {
                background: rgba(255,255,255,.99) !important;
                border-color: #d0d0e8 !important;
                color: #1a1a2e !important;
            }

            body.lt .leaflet-popup-tip {
                background: rgba(255,255,255,.99) !important;
            }
    </style>
</head>
<body>
    <div id='topbar'>
        <span class='t-logo'>⬡ DriveAndGo</span>
        <button class='btn active' id='bStreet' onclick='setLayer("street")'>Street</button>
        <button class='btn' id='bSat' onclick='setLayer("satellite")'>Satellite</button>
        <button class='btn' id='bTraffic' onclick='toggleTraffic()'>Traffic</button>
        <button class='btn' onclick='fitAll()'>Fit All</button>
        <button class='btn active' id='bRoutes' onclick='toggleRoutes()'>Routes</button>
        <span class='spacer'></span>
        <span id='liveCount'></span>
    </div>

    <div id='map'>
        <div id='spdbadge'>
            <div id='spdval'>0</div>
            <div id='spdunit'>KM/H</div>
        </div>
    </div>

    <div id='infobar'>
        <div class='ib-cell'><div class='ib-lbl'>Vehicle</div><div class='ib-val' id='iName'>Select a vehicle</div></div>
        <div class='ib-cell'><div class='ib-lbl'>Plate</div><div class='ib-val' id='iPlate'>—</div></div>
        <div class='ib-cell'><div class='ib-lbl'>Status</div><div class='ib-val' id='iStatus'>—</div></div>
        <div class='ib-cell'><div class='ib-lbl'>Speed</div><div class='ib-val' id='iSpd'>—</div></div>
        <div class='ib-cell'><div class='ib-lbl'>Last Update</div><div class='ib-val' id='iLast' style='font-size:10px;font-weight:500;'>—</div></div>
        <div class='ib-cell'><div class='ib-lbl'>Description</div><div class='ib-desc' id='iDesc'>—</div></div>
    </div>

    <script>
        var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([14.8169, 121.0453], 13);

        var layerDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        var layerLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        var layerSat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 });
        var layerTraffic = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { opacity: .2 });
        layerDark.addTo(map);

        var dark = true, mapType = 'street', trafficOn = false, routesOn = true;
        var markers = {}, polylines = {}, distLabels = {}, vdata = {};
        var hqMarker = null, hqLat = 14.8169, hqLng = 121.0453;
        var selectedVid = -1;

        function setTheme(d) {
            dark = d; document.body.classList.toggle('lt', !d); rebuildBase();
        }
        function rebuildBase() {
            [layerDark, layerLight, layerSat].forEach(l => { try { map.removeLayer(l); } catch (e) { } });
            (mapType === 'satellite' ? layerSat : dark ? layerDark : layerLight).addTo(map);
            if (trafficOn) layerTraffic.bringToFront();
        }
        function setLayer(t) {
            mapType = t;
            document.getElementById('bStreet').classList.toggle('active', t === 'street');
            document.getElementById('bSat').classList.toggle('active', t === 'satellite');
            rebuildBase();
        }
        function toggleTraffic() {
            trafficOn = !trafficOn;
            var b = document.getElementById('bTraffic');
            if (trafficOn) { layerTraffic.addTo(map); b.classList.add('active'); layerTraffic.bringToFront(); }
            else { map.removeLayer(layerTraffic); b.classList.remove('active'); }
        }
        function toggleRoutes() {
            routesOn = !routesOn;
            document.getElementById('bRoutes').classList.toggle('active', routesOn);
            for (var id in polylines) polylines[id].forEach(p => routesOn ? map.addLayer(p) : map.removeLayer(p));
            for (var id in distLabels) distLabels[id].forEach(m => routesOn ? map.addLayer(m) : map.removeLayer(m));
        }

        function setHQ(lat, lng, name, imgSrc) {
            hqLat = lat; hqLng = lng;
            if (hqMarker) map.removeLayer(hqMarker);
            var imgContent = imgSrc && imgSrc.trim()
                ? `<img src='${imgSrc}' class='hq-3d-img' onerror='this.style.display="none";this.nextElementSibling.style.display="flex"'/><div class='hq-fallback' style='display:none'>🏢</div>`
                : `<div class='hq-fallback'>🏢</div>`;
            var ic = L.divIcon({
                className: '',
                html: `<div class='hq-wrap'><div class='hq-img-ring'>${imgContent}</div><div class='hq-lbl'>${name}</div></div>`,
                iconSize: [96, 120], iconAnchor: [48, 60]
            });
            hqMarker = L.marker([lat, lng], { icon: ic, zIndexOffset: 3000 }).addTo(map);
            hqMarker.bindPopup(`<div class='pp-name'>🏢 ${name}</div><div class='pp-row'>Main Garage &amp; Operations Base</div><div class='pp-row' style='margin-top:6px;font-size:9px;color:#404070;'>${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`);
        }

        function statusColor(s) {
            switch ((s || '').toLowerCase()) {
                case 'available': return '#22c55e';
                case 'in-use': case 'rented': return '#eab308';
                case 'maintenance': return '#a855f7';
                case 'retired': return '#ef4444';
                default: return '#3b82f6';
            }
        }
        function typeEmoji(t) {
            t = (t || '').toLowerCase();
            if (t.includes('motor')) return '🏍';
            if (t.includes('van')) return '🚐';
            if (t.includes('truck')) return '🚛';
            if (t.includes('bicy')) return '🚲';
            return '🚗';
        }

        function markerHtml(vid, iconUrl, type, status, speed, isLost, name) {
            var c = statusColor(status);
            if (isLost) return `<div class='v-wrap'><div class='v-lost'></div><div class='v-name' style='color:#ef4444;border-color:rgba(239,68,68,.4)'>⚠ No GPS</div></div>`;
            var hasImg = iconUrl && iconUrl.trim() && iconUrl !== 'null' && (iconUrl.startsWith('http') || iconUrl.startsWith('data:'));
            var innerContent = hasImg
                ? `<img src='${iconUrl}' class='v-img' id='vimg${vid}' onerror='this.style.display="none";document.getElementById("vsym${vid}").style.display="flex"'/><div class='v-sym' id='vsym${vid}' style='display:none'>${typeEmoji(type)}</div>`
                : `<div class='v-sym' id='vsym${vid}'>${typeEmoji(type)}</div>`;
            var moving = speed > 0;
            return `<div class='v-wrap'>
        <div class='v-spd${moving ? " on" : ""}' id='vspd${vid}' style='color:${speed > 80 ? "#ef4444" : speed > 40 ? "#eab308" : "#00ffc8"}'>${speed > 0 ? Math.round(speed) + ' km/h' : ''}</div>
        <div style='position:relative;'>
          <div class='v-shadow-ring'></div>
          <div class='v-pulse${moving ? " moving" : ""}' id='vpulse${vid}' style='--rc:${c}'></div>
          <div class='v-ring${vid === selectedVid ? " selected" : ""}' id='vring${vid}' style='--rc:${c}'>
            <div class='v-inner'>${innerContent}</div>
          </div>
        </div>
        <div class='v-name'>${name}</div>
      </div>`;
        }

        function clearMarkers() {
            for (var id in markers) try { map.removeLayer(markers[id]); } catch (e) { }
            for (var id in polylines) try { polylines[id].forEach(p => map.removeLayer(p)); } catch (e) { }
            for (var id in distLabels) try { distLabels[id].forEach(m => map.removeLayer(m)); } catch (e) { }
            markers = {}; polylines = {}; distLabels = {}; vdata = {};
        }

        async function drawRoute(vid, la1, lo1, la2, lo2, color) {
            try {
                var url = `https://router.project-osrm.org/route/v1/driving/${lo1},${la1};${lo2},${la2}?overview=full&geometries=geojson`;
                var r = await (await fetch(url)).json();
                var pls = polylines[vid] || [], dls = distLabels[vid] || [];
                if (r.routes && r.routes.length) {
                    var coords = r.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    var dkm = (r.routes[0].distance / 1000).toFixed(1) + ' km';
                    var polyGlow = L.polyline(coords, { color, weight: 7, opacity: .14, dashArray: '10,6' });
                    if (routesOn) polyGlow.addTo(map); pls.push(polyGlow);
                    var poly = L.polyline(coords, { color, weight: 2.5, opacity: .7, dashArray: '10,5' });
                    if (routesOn) poly.addTo(map); pls.push(poly);
                    var mid = coords[Math.floor(coords.length / 2)];
                    var m = L.marker(mid, {
                        icon: L.divIcon({
                            className: '',
                            html: `<div style='background:rgba(3,3,10,.92);color:${color};border:1px solid ${color};border-radius:6px;padding:2px 9px;font-size:8.5px;font-weight:700;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.6);'>${dkm}</div>`,
                            iconSize: [64, 20]
                        })
                    });
                    if (routesOn) m.addTo(map); dls.push(m);
                }
                polylines[vid] = pls; distLabels[vid] = dls;
            } catch (e) { }
        }

        function updateVehicle(vid, name, plate, type, status, lat, lng, speed, lastU, iconUrl, isLost, desc) {
            vdata[vid] = { name, plate, type, status, lat, lng, speed, lastU, iconUrl, isLost, desc };
            if (markers[vid]) map.removeLayer(markers[vid]);
            if (polylines[vid]) { polylines[vid].forEach(p => map.removeLayer(p)); polylines[vid] = []; }
            if (distLabels[vid]) { distLabels[vid].forEach(m => map.removeLayer(m)); distLabels[vid] = []; }
            if (!isLost) drawRoute(vid, hqLat, hqLng, lat, lng, statusColor(status));
            var sz = isLost ? [24, 44] : [60, 100];
            var an = isLost ? [12, 22] : [30, 92];
            var ic = L.divIcon({ className: '', html: markerHtml(vid, iconUrl, type, status, speed || 0, isLost, name), iconSize: sz, iconAnchor: an });
            var pop = `<div class='pp-name'>${name}</div>
        <span class='pp-plate'>${plate}</span>
        <div class='pp-row'><span class='pp-status' style='color:${statusColor(status)}'>● ${(status || '').toUpperCase()}</span></div>
        <div class='pp-row'>⏱ ${lastU}</div>
        <div class='pp-row' style='font-size:9px;color:#383868;margin-top:4px;'>${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`;
            var mk = L.marker([lat, lng], { icon: ic });
            mk.bindPopup(pop); mk.addTo(map);
            mk.on('click', () => focusVehicle(
                vid,
                name,
                plate,
                status,
                lat,
                lng,
                speed || 0,
                lastU,
                vdata[vid] ? vdata[vid].iconUrl : '',
                vdata[vid] ? vdata[vid].desc : ''
            ));
            markers[vid] = mk;
            var cnt = Object.keys(markers).length;
            document.getElementById('liveCount').textContent = cnt + ' vehicle' + (cnt !== 1 ? 's' : '') + ' tracked';
        }

        function liveUpdateGPS(vid, lat, lng, speed) {
            if (!markers[vid]) return;
            var old = markers[vid].getLatLng();
            markers[vid].setLatLng([lat, lng]);
            if (vdata[vid]) { vdata[vid].lat = lat; vdata[vid].lng = lng; vdata[vid].speed = speed; }
            var spdEl = document.getElementById('vspd' + vid);
            if (spdEl) {
                spdEl.textContent = speed > 0 ? Math.round(speed) + ' km/h' : '';
                spdEl.className = speed > 0 ? 'v-spd on' : 'v-spd';
                spdEl.style.color = speed > 80 ? '#ef4444' : speed > 40 ? '#eab308' : '#00ffc8';
            }
            var pulse = document.getElementById('vpulse' + vid);
            if (pulse) pulse.className = speed > 0 ? 'v-pulse moving' : 'v-pulse';
            var dy = lat - old.lat;
            var dx = Math.cos(Math.PI / 180 * old.lat) * (lng - old.lng);
            if (Math.abs(dy) > 0.000001 || Math.abs(dx) > 0.000001) {
                var bearing = (90 - Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
                var ring = document.getElementById('vring' + vid);
                if (ring) { ring.style.transform = 'rotate(' + bearing + 'deg)'; ring.style.transition = 'transform 0.8s ease'; }
                var wrap = ring && ring.closest('.v-wrap');
                if (wrap) { var nm = wrap.querySelector('.v-name'); if (nm) { nm.style.transform = 'rotate(' + (-bearing) + 'deg)'; nm.style.transition = 'transform 0.8s ease'; } }
            }
            if (vid === selectedVid) {
                var badge = document.getElementById('spdbadge');
                var spdColor = speed > 80 ? '#ef4444' : speed > 40 ? '#eab308' : '#22c55e';
                if (speed > 0) {
                    badge.style.display = 'flex';
                    document.getElementById('spdval').textContent = Math.round(speed);
                    document.getElementById('iSpd').textContent = Math.round(speed) + ' km/h';
                    badge.style.borderColor = spdColor;
                    badge.style.boxShadow = '0 0 32px ' + spdColor + '99,inset 0 0 20px ' + spdColor + '14';
                } else {
                    badge.style.display = 'none';
                    document.getElementById('iSpd').textContent = 'Parked';
                }
            }
        }

        function focusVehicle(vid, name, plate, status, lat, lng, speed, lastU, iconUrl, desc) {
            if (selectedVid >= 0) { var old = document.getElementById('vring' + selectedVid); if (old) old.classList.remove('selected'); }
            selectedVid = vid;
            var ring = document.getElementById('vring' + vid);
            if (ring) ring.classList.add('selected');
            document.getElementById('iName').textContent = name;
            document.getElementById('iPlate').textContent = plate;
            document.getElementById('iStatus').textContent = (status || '').toUpperCase();
            document.getElementById('iSpd').textContent = speed > 0 ? Math.round(speed) + ' km/h' : 'Parked';
            document.getElementById('iLast').textContent = lastU;
            document.getElementById('iDesc').textContent = desc || '—';
            map.flyTo([lat, lng], 16, { animate: true, duration: 1.4, easeLinearity: .3 });
            if (markers[vid]) markers[vid].openPopup();
        }

        function fitAll() {
            var b = [];
            for (var id in markers) b.push(markers[id].getLatLng());
            if (hqMarker) b.push(hqMarker.getLatLng());
            if (b.length) map.fitBounds(b, { padding: [70, 70], animate: true, maxZoom: 15 });
        }
    </script>
</body>
</html>
